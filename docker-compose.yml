services:
  execution:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:${OP_GETH_VERSION:-v1.101605.0}
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8545:8545" # RPC
      - "8546:8546" # websocket
      - "7301:6060" # metrics
      - "30303:30303" # P2P TCP
      - "30303:30303/udp" # P2P UDP
    command:
      - "--datadir=/data"
      - "--verbosity=3"
      - "--http"
      - "--http.corsdomain=*"
      - "--http.vhosts=*"
      - "--http.addr=0.0.0.0"
      - "--http.port=8545"
      - "--http.api=web3,eth,net"
      - "--authrpc.addr=0.0.0.0"
      - "--authrpc.port=8551"
      - "--authrpc.vhosts=*"
      - "--authrpc.jwtsecret=${OP_NODE_L2_ENGINE_AUTH}"
      - "--ws"
      - "--ws.addr=0.0.0.0"
      - "--ws.port=8546"
      - "--ws.origins=*"
      - "--ws.api=web3,eth,net"
      - "--metrics"
      - "--metrics.addr=0.0.0.0"
      - "--metrics.port=6060"
      - "--syncmode=full"
      - "--maxpeers=100"
      - "--port=30303"
      - "--discovery.port=30303"
      - "--rollup.halt=major"
      - "--rollup.disabletxpoolgossip=true"
      - "--gcmode=archive"
    environment:
      - OP_GETH_GENESIS_FILE_PATH=/config/genesis.json
    volumes:
      - ./data:/data
      - ./config:/config
      - ./jwtsecret:/tmp/engine-auth-jwt
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:${OP_NODE_VERSION:-v1.16.5}
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      execution:
        condition: service_healthy
    ports:
      - "7545:8545" # RPC
      - "9222:9222" # P2P TCP
      - "9222:9222/udp" # P2P UDP
      - "7300:7300" # metrics
      - "6060:6060" # pprof
    command:
      - "op-node"
      - "--l1=${OP_NODE_L1_ETH_RPC}"
      - "--l1.beacon=${OP_NODE_L1_BEACON}"
      - "--l2=http://execution:8551"
      - "--l2.jwt-secret=/tmp/jwt-secret.txt"
      - "--rollup.config=/config/rollup.json"
      - "--sequencer.enabled=false"
      - "--verifier.l1-confs=4"
      - "--p2p.listen.ip=0.0.0.0"
      - "--p2p.listen.tcp=9222"
      - "--p2p.listen.udp=9222"
      - "--p2p.bootnodes=${OP_NODE_P2P_BOOTNODES}"
      - "--p2p.static=${OP_NODE_P2P_STATIC}"
      - "--p2p.advertise.ip=${OP_NODE_P2P_ADVERTISE_IP}"
      - "--rpc.addr=0.0.0.0"
      - "--rpc.port=8545"
      - "--metrics.enabled"
      - "--metrics.addr=0.0.0.0"
      - "--metrics.port=7300"
      - "--pprof.enabled"
      - "--log.level=info"
    volumes:
      - ./config:/config
      - ./jwtsecret:/tmp/jwt-secret.txt
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"optimism_syncStatus\",\"params\":[],\"id\":1}' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
