services:
  eigenda-proxy:
    image: ghcr.io/layr-labs/eigenda-proxy:${EIGENDA_PROXY_VERSION:-2.4.1}
    platform: linux/amd64
    environment:
      - EIGENDA_PROXY_EIGENDA_V2_NETWORK=${EIGENDA_PROXY_EIGENDA_V2_NETWORK}
      - EIGENDA_PROXY_EIGENDA_V2_CERT_VERIFIER_ROUTER_OR_IMMUTABLE_VERIFIER_ADDR=${EIGENDA_PROXY_EIGENDA_V2_CERT_VERIFIER_ROUTER_OR_IMMUTABLE_VERIFIER_ADDR}
      - EIGENDA_PROXY_STORAGE_BACKENDS_TO_ENABLE=${EIGENDA_PROXY_STORAGE_BACKENDS_TO_ENABLE}
      - EIGENDA_PROXY_STORAGE_DISPERSAL_BACKEND=${EIGENDA_PROXY_STORAGE_DISPERSAL_BACKEND}
      - EIGENDA_PROXY_EIGENDA_V2_DISPERSER_RPC=${EIGENDA_PROXY_EIGENDA_V2_DISPERSER_RPC}
      - EIGENDA_PROXY_EIGENDA_V2_ETH_RPC=${OP_NODE_L1_ETH_RPC}
      - EIGENDA_PROXY_APIS_TO_ENABLE=op-generic,metrics
    ports:
      - "3100:3100"   # EigenDA Proxy
      - "6060:6060" # metrics
    command:
      - "--addr=0.0.0.0"
      - "--port=3100"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  execution:
    image: ${OP_RETH_IMAGE:-ghcr.io/paradigmxyz/op-reth}:${OP_RETH_VERSION:-v1.10.2}
    platform: linux/amd64
    # restart: unless-stopped
    ports:
      - "8545:8545" # RPC
      - "8546:8546" # websocket
      - "7301:6060" # metrics
      - "30303:30303" # P2P TCP
      - "30303:30303/udp" # P2P UDP
    command:
      - "node"
      - "--datadir=/data"
      - "--chain=/config/genesis.json"
      - "--rollup.sequencer=${L2_REMOTE_RPC}"
      - "--http"
      - "--http.corsdomain=*"
      - "--http.addr=0.0.0.0"
      - "--http.port=8545"
      - "--http.api=web3,eth,net"
      - "--authrpc.addr=0.0.0.0"
      - "--authrpc.port=8551"
      - "--authrpc.jwtsecret=/jwt/jwt.hex"
      - "--ws"
      - "--ws.addr=0.0.0.0"
      - "--ws.port=8546"
      - "--ws.origins=*"
      - "--ws.api=web3,eth,net"
      - "--metrics=0.0.0.0:6060"
      - "--port=30303"
      - "--discovery.addr=0.0.0.0"
      - "--discovery.port=30303"
      - "--rollup.disable-tx-pool-gossip"
    volumes:
      - ./data:/data
      - ./config:/config
      - ./jwtsecret:/jwt/jwt.hex
  node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:${OP_NODE_VERSION:-v1.16.5}
    platform: linux/amd64
    # restart: unless-stopped
    depends_on:
      - execution
      - eigenda-proxy
    ports:
      - "7545:8545" # RPC
      - "9222:9222" # P2P TCP
      - "9222:9222/udp" # P2P UDP
      - "7300:7300" # metrics
      - "6061:6060" # pprof
    command:
      - "op-node"
      - "--l1=${OP_NODE_L1_ETH_RPC}"
      - "--l1.beacon=${OP_NODE_L1_BEACON}"
      - "--l2=http://execution:8551"
      - "--l2.jwt-secret=/jwt/jwt.hex"
      - "--l2.enginekind=reth"
      - "--rollup.config=/config/rollup.json"
      - "--sequencer.enabled=false"
      - "--verifier.l1-confs=4"
      - "--p2p.listen.ip=0.0.0.0"
      - "--p2p.listen.tcp=9222"
      - "--p2p.listen.udp=9222"
      - "--rpc.addr=0.0.0.0"
      - "--rpc.port=8545"
      - "--metrics.enabled"
      - "--metrics.addr=0.0.0.0"
      - "--metrics.port=7300"
      - "--pprof.enabled"
      - "--log.level=debug"
      - "--altda.enabled=true"
      - "--altda.da-server=${OP_NODE_ALTDA_DA_SERVER:-http://eigenda-proxy:3100}"
    volumes:
      - ./config:/config
      - ./jwtsecret:/jwt/jwt.hex
    environment:
      - OP_NODE_L1_ETH_RPC=${OP_NODE_L1_ETH_RPC}
      - OP_NODE_L1_BEACON=${OP_NODE_L1_BEACON}
      - OP_NODE_P2P_STATIC=${OP_NODE_P2P_STATIC}
      - OP_NODE_P2P_BOOTNODES=${OP_NODE_P2P_BOOTNODES}
      - OP_NODE_P2P_ADVERTISE_IP=${OP_NODE_P2P_ADVERTISE_IP}
      - OP_NODE_P2P_SYNC_ONLYREQTOSTATIC=${OP_NODE_P2P_SYNC_ONLYREQTOSTATIC}
      - OP_NODE_SYNCMODE=${OP_NODE_SYNCMODE}
